<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Widget</title>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: sans-serif; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: linear-gradient(135deg, #0f172a, #1e293b); padding: 30px; border-radius: 24px; text-align: center; border: 2px solid #38bdf8; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width: 100%; height: 100%; box-sizing: border-box; }
        .temp { font-size: 64px; font-weight: 900; margin: 10px 0; color: #38bdf8; }
        .loc { font-size: 20px; text-transform: uppercase; letter-spacing: 0.2em; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="card">
        <div class="loc" id="loc">Detecting Location...</div>
        <div class="temp" id="temp">--°C</div>
        <div id="desc" style="text-transform: capitalize;">Zen Exhibition HQ</div>
    </div>

    <script>
        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=28.2096&longitude=83.9856&current_weather=true');
                const data = await res.json();
                document.getElementById('temp').innerText = `${data.current_weather.temperature}°C`;
                document.getElementById('loc').innerText = 'Pokhara, Nepal';
            } catch (e) {
                document.getElementById('temp').innerText = 'Error';
            }
        }
        fetchWeather();
    </script>
</body>
</html>
