<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zen Flappy</title>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #0f172a; border-radius: 32px; border: 4px solid #10b981; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 500;

        let bird = { x: 50, y: 150, w: 20, h: 20, gravity: 0.6, lift: -12, velocity: 0 };
        let pipes = [];
        let score = 0;
        let frame = 0;

        function drawBird() {
            ctx.fillStyle = "#10b981";
            ctx.beginPath();
            ctx.roundRect(bird.x, bird.y, bird.w, bird.h, 4);
            ctx.fill();
        }

        function update() {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            if(bird.y > canvas.height) location.reload();

            if(frame % 90 === 0) {
                let h = Math.random() * (canvas.height/2);
                pipes.push({ x: canvas.width, y: 0, w: 40, h: h, top: true });
                pipes.push({ x: canvas.width, y: h + 120, w: 40, h: canvas.height, top: false });
            }

            pipes.forEach((p, i) => {
                p.x -= 2;
                if(p.x + p.w < 0) pipes.splice(i, 1);
                
                if(bird.x < p.x + p.w && bird.x + bird.w > p.x && bird.y < p.y + p.h && bird.y + bird.h > p.y) {
                    location.reload();
                }
            });
            frame++;
        }

        function drawPipes() {
            ctx.fillStyle = "#1e293b";
            pipes.forEach(p => {
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.w, p.h, 4);
                ctx.fill();
            });
        }

        window.onkeydown = () => bird.velocity += bird.lift;

        function render() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            drawBird();
            drawPipes();
            update();
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
