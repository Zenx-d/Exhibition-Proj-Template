<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zen Pong</title>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: sans-serif; }
        canvas { 
            border: 4px solid #4f46e5; 
            border-radius: 24px; 
            background: #0f172a; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: block;
            margin: auto;
        }
        #ui {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            box-sizing: border-box;
            color: white;
            font-size: 48px;
            font-weight: 900;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="s1">0</div>
        <div id="s2">0</div>
    </div>
    <canvas id="pong"></canvas>

    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 600;
        canvas.height = 400;

        const ball = { x: 300, y: 200, r: 8, speed: 5, dx: 5, dy: 5, color: "#818cf8" };
        const p1 = { x: 10, y: 150, w: 10, h: 80, score: 0, color: "#4f46e5" };
        const p2 = { x: 580, y: 150, w: 10, h: 80, score: 0, color: "#10b981" };

        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 4);
            ctx.fill();
        }

        function drawBall(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            // Glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = -ball.dx;
            ball.speed = 5;
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            p1.y = e.clientY - rect.top - p1.h/2;
        });

        function update() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // AI
            p2.y += (ball.y - (p2.y + p2.h/2)) * 0.1;

            if (ball.y + ball.r > canvas.height || ball.y - ball.r < 0) ball.dy = -ball.dy;

            let player = (ball.x < canvas.width/2) ? p1 : p2;

            if (collision(ball, player)) {
                let collidePoint = (ball.y - (player.y + player.h/2));
                collidePoint = collidePoint / (player.h/2);
                let angleRad = (Math.PI/4) * collidePoint;
                let direction = (ball.x < canvas.width/2) ? 1 : -1;
                ball.dx = direction * ball.speed * Math.cos(angleRad);
                ball.dy = ball.speed * Math.sin(angleRad);
                ball.speed += 0.2;
            }

            if (ball.x - ball.r < 0) {
                p2.score++;
                document.getElementById('s2').innerText = p2.score;
                resetBall();
            } else if (ball.x + ball.r > canvas.width) {
                p1.score++;
                document.getElementById('s1').innerText = p1.score;
                resetBall();
            }
        }

        function collision(b, p) {
            return b.x + b.r > p.x && b.x - b.r < p.x + p.w && b.y + b.r > p.y && b.y - b.r < p.y + p.h;
        }

        function render() {
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawRect(p1.x, p1.y, p1.w, p1.h, p1.color);
            drawRect(p2.x, p2.y, p2.w, p2.h, p2.color);
            drawBall(ball.x, ball.y, ball.r, ball.color);
            
            update();
            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
