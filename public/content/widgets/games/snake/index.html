<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Snake</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }
        canvas {
            border: 4px solid #4f46e5;
            border-radius: 24px;
            background: #0f172a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(79,70,229,0.3);
            max-width: 95%;
            max-height: 95%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
        }
        .score {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px rgba(79,70,229,0.5);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="score" id="score">Score: 0</div>
    </div>
    <canvas id="game" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        
        let score = 0;
        let snake = [{x: 200, y: 200}, {x: 190, y: 200}, {x: 180, y: 200}];
        let dx = 10;
        let dy = 0;
        let foodX;
        let foodY;
        let changingDirection = false;

        main();
        createFood();

        document.addEventListener("keydown", changeDirection);

        function main() {
            if (didGameEnd()) {
                ctx.fillStyle = "rgba(15, 23, 42, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 30px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
                ctx.font = "16px sans-serif";
                ctx.fillText("Press Space to Restart", canvas.width / 2, canvas.height / 2 + 40);
                
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') location.reload();
                }, { once: true });
                return;
            }

            changingDirection = false;
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100);
        }

        function clearCanvas() {
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#818cf8" : "#4f46e5";
                ctx.strokeStyle = "#1e1b4b";
                ctx.beginPath();
                ctx.roundRect(part.x, part.y, 10, 10, 2);
                ctx.fill();
                ctx.stroke();
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            const didEatFood = snake[0].x === foodX && snake[0].y === foodY;
            if (didEatFood) {
                score += 10;
                scoreEl.innerHTML = `Score: ${score}`;
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > canvas.width - 10;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > canvas.height - 10;
            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        function createFood() {
            foodX = Math.round((Math.random() * (canvas.width - 10)) / 10) * 10;
            foodY = Math.round((Math.random() * (canvas.height - 10)) / 10) * 10;
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x == foodX && part.y == foodY) createFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#ef4444";
            ctx.beginPath();
            ctx.roundRect(foodX, foodY, 10, 10, 2);
            ctx.fill();
            // Glow effect
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ef4444";
            ctx.fillRect(foodX, foodY, 10, 10);
            ctx.shadowBlur = 0;
        }

        function changeDirection(event) {
            if (changingDirection) return;
            changingDirection = true;
            const keyPressed = event.keyCode;
            const UP_KEY = 38;
            const DOWN_KEY = 40;
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;

            const goingUp = dy === -10;
            const goingDown = dy === 10;
            const goingRight = dx === 10;
            const goingLeft = dx === -10;

            if (keyPressed === LEFT_KEY && !goingRight) { dx = -10; dy = 0; }
            if (keyPressed === UP_KEY && !goingDown) { dx = 0; dy = -10; }
            if (keyPressed === RIGHT_KEY && !goingLeft) { dx = 10; dy = 0; }
            if (keyPressed === DOWN_KEY && !goingUp) { dx = 0; dy = 10; }
        }
    </script>
</body>
</html>
