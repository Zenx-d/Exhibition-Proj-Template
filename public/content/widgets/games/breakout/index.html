<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zen Breakout</title>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #0f172a; border-radius: 32px; border: 4px solid #4f46e5; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 30px; left: 30px; color: white; pointer-events: none; }
        .score { font-size: 32px; font-weight: 900; letter-spacing: 0.1em; text-shadow: 0 0 20px rgba(79,70,229,0.5); }
    </style>
</head>
<body>
    <div id="ui"><div class="score" id="score">Score: 0</div></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        canvas.width = 600;
        canvas.height = 400;

        let score = 0;
        const ball = { x: 300, y: 350, r: 8, dx: 4, dy: -4, speed: 4, color: "#818cf8" };
        const paddle = { w: 100, h: 12, x: 250, color: "#4f46e5" };
        
        const brick = { rows: 5, cols: 8, w: 60, h: 20, padding: 10, offsetTop: 50, offsetLeft: 35 };
        let bricks = [];

        function initBricks() {
            for(let c=0; c<brick.cols; c++) {
                bricks[c] = [];
                for(let r=0; r<brick.rows; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }

        function drawBricks() {
            for(let c=0; c<brick.cols; c++) {
                for(let r=0; r<brick.rows; r++) {
                    if(bricks[c][r].status === 1) {
                        const bX = (c*(brick.w+brick.padding)) + brick.offsetLeft;
                        const bY = (r*(brick.h+brick.padding)) + brick.offsetTop;
                        bricks[c][r].x = bX;
                        bricks[c][r].y = bY;
                        ctx.fillStyle = `hsl(${r * 20 + 220}, 70%, 60%)`;
                        ctx.beginPath();
                        ctx.roundRect(bX, bY, brick.w, brick.h, 4);
                        ctx.fill();
                    }
                }
            }
        }

        function collisionDetection() {
            for(let c=0; c<brick.cols; c++) {
                for(let r=0; r<brick.rows; r++) {
                    const b = bricks[c][r];
                    if(b.status === 1) {
                        if(ball.x > b.x && ball.x < b.x+brick.w && ball.y > b.y && ball.y < b.y+brick.h) {
                            ball.dy = -ball.dy;
                            b.status = 0;
                            score += 10;
                            scoreEl.innerText = `Score: ${score}`;
                            if(score === brick.rows * brick.cols * 10) {
                                alert("YOU WIN! 🎉");
                                location.reload();
                            }
                        }
                    }
                }
            }
        }

        function drawBall() {
            ctx.fillStyle = ball.color;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 10;
            ctx.shadowColor = ball.color;
        }

        function drawPaddle() {
            ctx.fillStyle = paddle.color;
            ctx.beginPath();
            ctx.roundRect(paddle.x, canvas.height-paddle.h-10, paddle.w, paddle.h, 6);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            paddle.x = e.clientX - rect.left - paddle.w/2;
            if(paddle.x < 0) paddle.x = 0;
            if(paddle.x > canvas.width - paddle.w) paddle.x = canvas.width - paddle.w;
        });

        function update() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            if(ball.x + ball.r > canvas.width || ball.x - ball.r < 0) ball.dx = -ball.dx;
            if(ball.y - ball.r < 0) ball.dy = -ball.dy;
            
            if(ball.y + ball.r > canvas.height - paddle.h - 10) {
                if(ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                    ball.dy = -ball.speed;
                } else if(ball.y + ball.r > canvas.height) {
                    location.reload();
                }
            }

            collisionDetection();
        }

        function render() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            drawBricks();
            drawBall();
            drawPaddle();
            update();
            requestAnimationFrame(render);
        }

        initBricks();
        render();
    </script>
</body>
</html>
