<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zen Embed</title>
    <style>
        body { margin: 0; background: #0f172a; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .browser-chrome { background: #1e293b; padding: 10px 20px; display: flex; gap: 8px; border-bottom: 2px solid #334155; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ef4444; }
        .yellow { background: #f59e0b; }
        .green { background: #10b981; }
        iframe { flex: 1; border: none; background: white; border-radius: 0 0 24px 24px; }
    </style>
</head>
<body>
    <div class="browser-chrome">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
        <div style="flex: 1; text-align: center; color: #94a3b8; font-family: monospace; font-size: 12px;">HTTPS://EXHIBITION.ZEN/EMBED</div>
    </div>
    <iframe id="frame" src="https://wikipedia.org"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const target = urlParams.get('url');
        if (target) document.getElementById('frame').src = target;
    </script>
</body>
</html>
